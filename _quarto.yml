project:
  type: book

book:
  title: "Open and Reproducible Research"
  author: "Aditya Ranganath"
  repo-url: https://github.com/aranganath24/open-reproducible-research
  repo-actions: [source, edit, issue] 
  date: "9/18/2025"
  chapters:
    - index.qmd
    - intro.qmd
    - summary.qmd
    - references.qmd

bibliography: references.bib

format:
  html:
    theme: Cosmo
    toc: true
    include-after-body: footer.html 
    toc-depth: 3
    output-dir: docs/ 
  pdf:
    documentclass: scrreprt

editor: visual

